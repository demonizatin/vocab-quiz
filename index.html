<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f7f1e6" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#10110f" media="(prefers-color-scheme: dark)" />
  <title>Shabdam — vocabulary, sparring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.21.0/dist/tabler-icons.min.css" />
  <style>
    :root {
      /* Light: warm parchment + saffron + ink */
      --bg-page:        #f4ecdc;
      --bg-page-2:      #efe5cf;
      --bg-primary:     #fbf5e6;
      --bg-secondary:   #e9dfc7;
      --bg-tertiary:    #ddd0b1;
      --bg-success:     #d8e8c2;
      --bg-danger:      #f3d6cf;
      --bg-warning:     #f7dfa6;
      --bg-ink:         #161512;
      --bg-accent:      #e85a2a;   /* saffron-orange */
      --bg-accent-2:    #0f5d56;   /* deep teal */
      --bg-accent-3:    #c9a227;   /* marigold yellow */
      --bg-accent-4:    #6b2bb8;   /* indigo */

      --text-primary:   #161512;
      --text-secondary: #5a5340;
      --text-tertiary:  #8a8170;
      --text-muted:     #b0a78f;
      --text-success:   #2b4f0d;
      --text-danger:    #832015;
      --text-warning:   #6b4a08;
      --text-on-ink:    #fbf5e6;
      --text-on-accent: #fff7e6;

      --border-soft:    rgba(22,21,18,0.08);
      --border-mid:     rgba(22,21,18,0.18);
      --border-strong:  rgba(22,21,18,0.55);
      --border-success: rgba(43,79,13,0.45);
      --border-danger:  rgba(131,32,21,0.45);

      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 22px;
      --radius-xl: 28px;
      --shadow-sm: 0 1px 0 rgba(22,21,18,0.08);
      --shadow-md: 0 2px 0 0 rgba(22,21,18,0.85);
      --shadow-lg: 0 4px 0 0 rgba(22,21,18,0.85);

      --font-display: "Fraunces", "Iowan Old Style", Georgia, serif;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:        #10110f;
        --bg-page-2:      #16171410;
        --bg-primary:     #1a1b18;
        --bg-secondary:   #25261f;
        --bg-tertiary:    #33342b;
        --bg-success:     #1c3309;
        --bg-danger:      #3e150f;
        --bg-warning:     #3a2a08;
        --bg-ink:         #fbf5e6;
        --bg-accent:      #ff7644;
        --bg-accent-2:    #1c8a80;
        --bg-accent-3:    #e6b730;
        --bg-accent-4:    #9d6df0;

        --text-primary:   #f1ead7;
        --text-secondary: #b6ab8c;
        --text-tertiary:  #847a62;
        --text-muted:     #5a5340;
        --text-success:   #b6d684;
        --text-danger:    #f1a094;
        --text-warning:   #f4ca74;
        --text-on-ink:    #161512;
        --text-on-accent: #1a0c04;

        --border-soft:    rgba(241,234,215,0.08);
        --border-mid:     rgba(241,234,215,0.18);
        --border-strong:  rgba(241,234,215,0.55);
        --shadow-md: 0 2px 0 0 rgba(241,234,215,0.85);
        --shadow-lg: 0 4px 0 0 rgba(241,234,215,0.85);
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    body {
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: var(--font-sans);
      line-height: 1.5;
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      background-image:
        radial-gradient(circle at 8% 12%, rgba(232,90,42,0.10), transparent 35%),
        radial-gradient(circle at 92% 88%, rgba(15,93,86,0.10), transparent 40%),
        radial-gradient(circle at 50% 60%, rgba(201,162,39,0.08), transparent 50%);
      background-attachment: fixed;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-image:
          radial-gradient(circle at 8% 12%, rgba(255,118,68,0.10), transparent 40%),
          radial-gradient(circle at 92% 88%, rgba(28,138,128,0.12), transparent 45%),
          radial-gradient(circle at 50% 60%, rgba(230,183,48,0.05), transparent 55%);
      }
    }
    /* Subtle grain to take the digital chill off */
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      opacity: 0.45; mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.08  0 0 0 0 0.08  0 0 0 0.10 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }
    @media (prefers-color-scheme: dark) {
      body::before { mix-blend-mode: screen; opacity: 0.35; }
    }

    .qg-page {
      width: 100%;
      max-width: 720px;
      padding: clamp(1rem, 3vw, 2rem) clamp(1rem, 3vw, 1.5rem) 4rem;
      position: relative; z-index: 1;
    }

    /* ---- Top bar ---- */
    .qg-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.25rem 1.5rem;
    }
    .qg-brand {
      display: inline-flex; align-items: baseline; gap: 0.55rem;
      text-decoration: none; color: var(--text-primary);
    }
    .qg-brand-mark {
      font-family: var(--font-display); font-weight: 900;
      font-size: 28px; letter-spacing: -0.02em;
      line-height: 1; font-style: italic;
    }
    .qg-brand-mark em { font-style: italic; color: var(--bg-accent); }
    .qg-brand-tag {
      font-family: var(--font-mono); font-size: 10.5px;
      text-transform: uppercase; letter-spacing: 0.18em;
      color: var(--text-tertiary);
      border-left: 1px solid var(--border-mid); padding-left: 0.55rem;
    }
    .qg-topbar-right { display: inline-flex; align-items: center; gap: 0.5rem; }
    .qg-pill-mono {
      font-family: var(--font-mono); font-size: 10.5px;
      text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--text-tertiary);
      padding: 5px 10px;
      border: 1px solid var(--border-mid);
      border-radius: 999px;
      background: var(--bg-primary);
    }

    /* ---- Welcome / hero ---- */
    .qg-hero { margin: 0.5rem 0 1.5rem; }
    .qg-eyebrow {
      font-family: var(--font-mono); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.22em;
      color: var(--bg-accent); font-weight: 700;
      margin-bottom: 0.6rem;
    }
    .qg-hero h1 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(40px, 7.5vw, 64px);
      line-height: 0.98;
      letter-spacing: -0.025em;
      margin: 0 0 0.75rem;
      color: var(--text-primary);
    }
    .qg-hero h1 em {
      font-style: italic; font-weight: 900;
      color: var(--bg-accent-2);
      position: relative;
    }
    .qg-hero h1 .qg-underline {
      background-image: linear-gradient(transparent 65%, var(--bg-accent-3) 65%, var(--bg-accent-3) 90%, transparent 90%);
      padding: 0 0.05em;
    }
    .qg-hero p {
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 44ch;
      margin: 0;
    }

    /* ---- Action cards (welcome) ---- */
    .qg-deck {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 1.75rem 0 1.25rem;
    }
    @media (max-width: 560px) {
      .qg-deck { grid-template-columns: 1fr; }
    }
    .qg-tile {
      position: relative;
      background: var(--bg-primary);
      border: 1.5px solid var(--text-primary);
      border-radius: var(--radius-lg);
      padding: 1.4rem 1.25rem 1.25rem;
      text-align: left;
      cursor: pointer;
      font-family: var(--font-sans);
      color: var(--text-primary);
      box-shadow: var(--shadow-lg);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      min-height: 220px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .qg-tile:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 0 var(--text-primary);
    }
    .qg-tile:active { transform: translate(0, 0); box-shadow: var(--shadow-md); }
    .qg-tile-glyph {
      width: 44px; height: 44px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 12px; font-size: 24px;
      margin-bottom: 0.9rem;
    }
    .qg-tile-bot .qg-tile-glyph { background: var(--bg-accent); color: var(--text-on-accent); }
    .qg-tile-friend .qg-tile-glyph { background: var(--bg-accent-2); color: #fff; }
    .qg-tile-kicker {
      font-family: var(--font-mono); font-size: 10.5px;
      text-transform: uppercase; letter-spacing: 0.16em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .qg-tile-title {
      font-family: var(--font-display);
      font-size: 26px; font-weight: 700; line-height: 1;
      letter-spacing: -0.02em;
      margin: 0 0 0.4rem;
    }
    .qg-tile-desc {
      font-size: 13.5px; color: var(--text-secondary);
      margin: 0; line-height: 1.45;
    }
    .qg-tile-arrow {
      margin-top: auto; padding-top: 1rem;
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600;
      color: var(--text-primary);
    }
    .qg-tile-arrow i { transition: transform 0.15s ease; }
    .qg-tile:hover .qg-tile-arrow i { transform: translateX(4px); }
    /* Decorative repeated word watermark behind tiles */
    .qg-tile-bg {
      position: absolute; inset: auto -10% -20% auto;
      font-family: var(--font-display); font-style: italic;
      font-weight: 900; font-size: 96px; letter-spacing: -0.04em;
      color: var(--text-primary);
      opacity: 0.06; pointer-events: none; white-space: nowrap;
      transform: rotate(-8deg);
    }

    /* ---- Footer marquee ---- */
    .qg-marquee {
      margin-top: 2.5rem;
      border-top: 1px dashed var(--border-mid);
      padding-top: 1rem;
      display: flex; flex-wrap: wrap; gap: 6px 10px;
      align-items: center;
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
    }
    .qg-marquee b { color: var(--text-secondary); font-weight: 700; }
    .qg-marquee-dot { color: var(--text-muted); }

    /* ---- Generic card (for in-game) ---- */
    .qg-card {
      background: var(--bg-primary);
      border: 1.5px solid var(--text-primary);
      border-radius: var(--radius-lg);
      padding: 1.5rem 1.5rem 1.5rem;
      box-shadow: var(--shadow-lg);
      min-height: 380px;
      display: flex; flex-direction: column;
    }
    .qg-card-flat {
      background: var(--bg-primary);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.25rem;
    }

    /* ---- Header strip in question/match ---- */
    .qg-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem; font-size: 12.5px; color: var(--text-secondary);
      font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em;
    }
    .qg-level-pill {
      display: inline-block;
      background: var(--bg-ink); color: var(--text-on-ink);
      padding: 3px 9px; border-radius: 999px;
      font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.08em;
    }

    .qg-bar-track {
      height: 6px; background: var(--bg-secondary);
      border-radius: 999px; overflow: hidden;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border-soft);
    }
    .qg-bar-fill {
      height: 100%;
      background: var(--bg-accent);
      width: 100%; transition: width linear;
    }

    .qg-question {
      font-family: var(--font-display);
      font-size: clamp(20px, 3vw, 24px);
      font-weight: 500;
      line-height: 1.35;
      letter-spacing: -0.01em;
      margin: 0 0 1.5rem;
      color: var(--text-primary);
    }
    .qg-options { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
    .qg-opt {
      text-align: left;
      padding: 14px 16px;
      font-size: 15px; font-weight: 500;
      background: var(--bg-primary);
      border: 1.25px solid var(--border-mid);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: background-color 0.12s, border-color 0.12s, transform 0.06s;
      display: flex; align-items: center; gap: 12px;
    }
    .qg-opt::before {
      content: attr(data-letter);
      font-family: var(--font-mono); font-size: 11px; font-weight: 700;
      color: var(--text-tertiary);
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      padding: 2px 7px; min-width: 22px; text-align: center;
    }
    .qg-opt:hover:not(:disabled) {
      background: var(--bg-secondary);
      border-color: var(--border-strong);
    }
    .qg-opt:active:not(:disabled) { transform: scale(0.995); }
    .qg-opt:disabled { cursor: default; }
    .qg-opt.qg-correct {
      background: var(--bg-success);
      border-color: var(--border-success);
      color: var(--text-success);
    }
    .qg-opt.qg-correct::before { color: var(--text-success); border-color: var(--border-success); }
    .qg-opt.qg-wrong {
      background: var(--bg-danger);
      border-color: var(--border-danger);
      color: var(--text-danger);
    }
    .qg-opt.qg-wrong::before { color: var(--text-danger); border-color: var(--border-danger); }
    .qg-opt.qg-fade { opacity: 0.45; }

    /* ---- Buttons ---- */
    .qg-btn {
      padding: 12px 22px;
      font-size: 14px; font-weight: 600;
      background: var(--bg-ink);
      color: var(--text-on-ink);
      border: 1.5px solid var(--text-primary);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-family: var(--font-sans);
      box-shadow: var(--shadow-md);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      letter-spacing: 0.005em;
    }
    .qg-btn:hover:not(:disabled) { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 0 var(--text-primary); }
    .qg-btn:active:not(:disabled) { transform: translate(0, 0); box-shadow: var(--shadow-md); }
    .qg-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: var(--shadow-md); }
    .qg-btn-accent {
      background: var(--bg-accent);
      color: var(--text-on-accent);
    }
    .qg-btn-secondary {
      padding: 12px 22px;
      font-size: 14px; font-weight: 600;
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1.5px solid var(--text-primary);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-family: var(--font-sans);
      box-shadow: var(--shadow-md);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .qg-btn-secondary:hover:not(:disabled) { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 0 var(--text-primary); background: var(--bg-secondary); }
    .qg-btn-secondary:active:not(:disabled) { transform: translate(0, 0); box-shadow: var(--shadow-md); }
    .qg-btn-ghost {
      background: transparent; border: none;
      color: var(--text-secondary); cursor: pointer;
      font-family: var(--font-sans); font-size: 13px; font-weight: 500;
      padding: 8px 12px; border-radius: var(--radius-sm);
    }
    .qg-btn-ghost:hover { color: var(--text-primary); background: var(--bg-secondary); }

    .qg-actions { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .qg-status {
      font-family: var(--font-mono); font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-secondary);
      text-align: center; margin-top: 12px; min-height: 18px;
    }
    .qg-loading {
      text-align: center; padding: 3rem 0;
      color: var(--text-secondary); font-size: 14px;
      font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase;
    }
    .qg-error {
      text-align: center; padding: 2rem 0;
      color: var(--text-danger); font-size: 14px;
    }

    /* ---- Input ---- */
    .qg-field {
      display: block; width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      background: var(--bg-primary);
      border: 1.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font-sans);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .qg-field:focus {
      outline: none;
      border-color: var(--text-primary);
      box-shadow: 0 0 0 3px var(--bg-accent-3);
    }
    .qg-field-label {
      display: block;
      font-family: var(--font-mono); font-size: 10.5px;
      text-transform: uppercase; letter-spacing: 0.18em;
      color: var(--text-tertiary);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .qg-field-hint {
      font-size: 12px; color: var(--text-tertiary); margin-top: 6px;
      font-family: var(--font-sans);
    }
    .qg-form-grid { display: grid; gap: 14px; }
    .qg-form-row-2 { grid-template-columns: 1fr 120px; }
    @media (max-width: 460px) { .qg-form-row-2 { grid-template-columns: 1fr; } }
    .qg-field-code {
      font-family: var(--font-mono);
      font-size: 24px; font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-align: center;
      padding: 16px 14px;
    }

    /* ---- Screen-level header (back chevron + title) ---- */
    .qg-screen-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .qg-screen-title {
      font-family: var(--font-display);
      font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
      margin: 0; line-height: 1;
    }
    .qg-screen-eyebrow {
      font-family: var(--font-mono); font-size: 10.5px;
      text-transform: uppercase; letter-spacing: 0.2em;
      color: var(--bg-accent); font-weight: 700;
      margin-bottom: 6px;
    }

    /* ---- Matchmaking (bot) ---- */
    .qg-match-search {
      text-align: center; padding: 2.5rem 0 2rem;
    }
    .qg-match-search h2 {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 700;
      letter-spacing: -0.02em;
      margin: 1rem 0 0.5rem;
    }
    .qg-match-search p {
      color: var(--text-secondary); margin: 0; font-size: 14px;
      font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.14em;
    }
    .qg-match-loader {
      font-size: 44px;
      color: var(--bg-accent);
      animation: qg-spin 1.2s linear infinite;
      display: inline-block;
    }
    @keyframes qg-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes qg-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .qg-pulse-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--bg-accent);
      margin-right: 8px; vertical-align: middle;
      animation: qg-pulse 1.4s ease-in-out infinite;
    }

    .qg-match-intro { text-align: center; padding: 0.5rem 0 0; }
    .qg-match-intro h2 {
      font-family: var(--font-display);
      font-size: 32px; font-weight: 700; letter-spacing: -0.025em;
      margin: 0.25rem 0 1.5rem;
    }
    .qg-match-intro h2 em { font-style: italic; color: var(--bg-accent); }
    .qg-match-pair {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 0.75rem; align-items: stretch;
      margin: 0 0 1.5rem;
    }
    .qg-match-card {
      background: var(--bg-secondary);
      border: 1.5px solid var(--text-primary);
      border-radius: var(--radius-md);
      padding: 1.1rem 0.85rem;
      text-align: center;
      box-shadow: var(--shadow-md);
    }
    .qg-match-card-label {
      font-family: var(--font-mono); font-size: 10.5px;
      text-transform: uppercase; letter-spacing: 0.18em;
      color: var(--text-tertiary); margin-bottom: 0.4rem; font-weight: 700;
    }
    .qg-match-card-name {
      font-family: var(--font-display); font-weight: 700;
      font-size: 18px; letter-spacing: -0.01em;
      margin-bottom: 0.25rem;
    }
    .qg-match-card-elo {

    .qg-copy-btn {

    /* Toast for copied lobby code */

      background: var(--bg-ink); color: var(--text-on-ink);

      letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .qg-toast.qg-toast-show { opacity: 1; transform: translateX(-50%) translateY(-6px); }
  </style>
</head>
<body>
  <h1 class="sr-only">Shabdam: vocabulary sparring. Match with a bot or play with a friend over a lobby code.</h1>
  <div class="qg-page">
    <header class="qg-topbar">
      <a class="qg-brand" href="#" id="qg-brand">
        <span class="qg-brand-mark">Shabdam<em>.</em></span>
        <span class="qg-brand-tag">v2 · word sparring</span>
      </a>
      <div class="qg-topbar-right">
        <span class="qg-pill-mono" id="qg-status-pill">10 · 7s · ELO</span>
      </div>
    </header>
    <main id="qg-root">
      <div class="qg-loading">Booting word bank<span class="qg-pulse-dot" style="margin-left:8px"></span></div>
    </main>
  </div>
  <div class="qg-toast" id="qg-toast"></div>

  <script src="config.js"></script>
  <script type="module">
    // Supabase is loaded lazily — only when the user opens friend mode. A
    // failure (CDN block, firewall, slow DNS to esm.sh) won't prevent the
    // page from booting; it will only disable friend mode.
    const TOTAL = 10;
    const SECONDS = 7;
    const CFG = window.QUIZ_CONFIG || {};
    const SUPABASE_CONFIGURED = CFG.SUPABASE_URL && !CFG.SUPABASE_URL.includes('YOUR_PROJECT')
      && CFG.SUPABASE_ANON_KEY && !CFG.SUPABASE_ANON_KEY.includes('YOUR_ANON_KEY');
    let supabase = null;
    let _supabaseLoading = null;
    async function getSupabase() {
      if (!SUPABASE_CONFIGURED) return null;
      if (supabase) return supabase;
      if (!_supabaseLoading) {
        _supabaseLoading = import('https://esm.sh/@supabase/supabase-js@2')
          .then(mod => { supabase = mod.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY); return supabase; })
          .catch(err => { console.error('Supabase load failed:', err); _supabaseLoading = null; throw err; });
      }
      return _supabaseLoading;
    }
    const LOBBY_TABLE = 'match_lobbies';

    // ---- ELO ladder — grammar + vocab split per band (each band sums to TOTAL=10) ----
    // Grammar questions are tagged t='g', vocab t='v' in the POOL.
    // L6 vocab is treated as L5 at quiz time (grammar caps at C1/L5).
    const ELO_LADDER = [
      { min: 0,    max: 774,   label: '<775',
        grammar: {1:6, 2:3, 3:0, 4:0, 5:0}, vocab: {1:1, 2:0, 3:0, 4:0, 5:0} },
      { min: 775,  max: 924,   label: '775-924',
        grammar: {1:3, 2:4, 3:1, 4:0, 5:0}, vocab: {1:2, 2:0, 3:0, 4:0, 5:0} },
      { min: 925,  max: 1074,  label: '925-1074',
        grammar: {1:1, 2:3, 3:2, 4:1, 5:0}, vocab: {1:1, 2:2, 3:0, 4:0, 5:0} },
      { min: 1075, max: 1224,  label: '1075-1224',
        grammar: {1:1, 2:1, 3:3, 4:1, 5:0}, vocab: {1:1, 2:2, 3:1, 4:0, 5:0} },
      { min: 1225, max: 1399,  label: '1225-1399',
        grammar: {1:0, 2:1, 3:1, 4:1, 5:2}, vocab: {1:0, 2:1, 3:2, 4:1, 5:1} },
      { min: 1400, max: 1499,  label: '1400-1499',
        grammar: {1:0, 2:0, 3:1, 4:1, 5:1}, vocab: {1:0, 2:1, 3:2, 4:2, 5:2} },
      { min: 1500, max: 99999, label: '1500+',
        grammar: {1:0, 2:0, 3:0, 4:1, 5:1}, vocab: {1:0, 2:1, 3:1, 4:3, 5:3} },
    ];
    const BOT_NAMES = [
      'Ananya', 'Rahul', 'Priya', 'Vikram', 'Kavya', 'Arjun', 'Diya',
      'Aditya', 'Ishaan', 'Anaya', 'Riya', 'Aarav', 'Sara', 'Kabir',
      'Neha', 'Aryan', 'Tara', 'Veer', 'Mira', 'Dev', 'Ira', 'Yash',
      'Maya', 'Rohan', 'Nikhil', 'Ananth', 'Zoya', 'Reyansh',
    ];
    const LEVEL_STRENGTH = { 1: 800, 2: 1000, 3: 1200, 4: 1400, 5: 1600 };
    const K_FACTOR = 32;

    let POOL = null;
    let match = null;
    let friend = null;   // friend-mode session state + polling handle
    const root = document.getElementById('qg-root');

    fetch('questions.json')
      .then(r => { if (!r.ok) throw new Error('Failed to load questions: ' + r.status); return r.json(); })
      .then(data => { POOL = data; showWelcome(); })
      .catch(err => { root.innerHTML = '<div class="qg-error">Could not load questions. ' + escapeHtml(err.message) + '</div>'; });

    document.getElementById('qg-brand').addEventListener('click', e => {
      e.preventDefault(); stopFriendPolling(); showWelcome();
    });

    // ----------------------------------------------------------------
    // Welcome
    // ----------------------------------------------------------------
    function showWelcome() {
      stopFriendPolling();
      root.innerHTML = `
        <section class="qg-hero">
          <div class="qg-eyebrow">Vocabulary · sparring · daily reps</div>
          <h1>Sharpen the <em>word</em>.<br/><span class="qg-underline">Pick your fight.</span></h1>
          <p>Ten questions. Seven seconds each. Pick the meaning that fits — beat a bot tuned to your rating, or call out a friend with a lobby code.</p>
        </section>

        <section class="qg-deck" role="navigation" aria-label="Choose a mode">
          <button class="qg-tile qg-tile-bot" id="qg-mode-bot" aria-label="Match with bot">
            <span class="qg-tile-glyph"><i class="ti ti-robot"></i></span>
            <span class="qg-tile-kicker">Solo · Instant</span>
            <h2 class="qg-tile-title">Match with Bot</h2>
            <p class="qg-tile-desc">A rating-matched opponent shows up in seconds. Win, lose, draw — your ELO moves either way.</p>
            <span class="qg-tile-arrow">Start sparring <i class="ti ti-arrow-right" aria-hidden="true"></i></span>
            <span class="qg-tile-bg">शब्द</span>
          </button>

          <button class="qg-tile qg-tile-friend" id="qg-mode-friend" aria-label="Play with friend">
            <span class="qg-tile-glyph"><i class="ti ti-users"></i></span>
            <span class="qg-tile-kicker">1v1 · Lobby code</span>
            <h2 class="qg-tile-title">Play with Friend</h2>
            <p class="qg-tile-desc">Spin up a 4-letter code, share it, and play the exact same ten questions head-to-head. No accounts.</p>
            <span class="qg-tile-arrow">Open a lobby <i class="ti ti-arrow-right" aria-hidden="true"></i></span>
            <span class="qg-tile-bg">मित्र</span>
          </button>
        </section>

        <div class="qg-marquee" aria-hidden="true">
          <b>${POOL ? POOL.length.toLocaleString() : '24,000+'}</b> words in the bank
          <span class="qg-marquee-dot">·</span> 7s per call <span class="qg-marquee-dot">·</span>
          K-factor ${K_FACTOR} <span class="qg-marquee-dot">·</span> built for the daily commute
        </div>
      `;
      document.getElementById('qg-mode-bot').addEventListener('click', showMatchSearch);
      document.getElementById('qg-mode-friend').addEventListener('click', showFriendChoice);
    }

    // ----------------------------------------------------------------
    // Bot match flow (logic preserved)
    // ----------------------------------------------------------------
    function randomUserElo() {
      const r = Math.random();
      if (r < 0.15) return 700 + Math.floor(Math.random() * 200);
      if (r < 0.70) return 900 + Math.floor(Math.random() * 400);
      if (r < 0.92) return 1300 + Math.floor(Math.random() * 200);
      return 1500 + Math.floor(Math.random() * 200);
    }
    function randomBotElo(userElo) {
      const delta = Math.floor(Math.random() * 301) - 150;
      return Math.max(500, userElo + delta);
    }
    function getEloBand(elo) {
      return ELO_LADDER.find(b => elo >= b.min && elo <= b.max) || ELO_LADDER[0];
    }
    function pickQuestionsByElo(elo) {
      const band = getEloBand(elo);
      // Bucket POOL by (type, effective level). L6 vocab is treated as L5
      // at quiz time (matches grammar's C1 ceiling). Questions without an
      // explicit `t` default to vocab for backward compat.
      const buckets = {
        g: {1:[],2:[],3:[],4:[],5:[]},
        v: {1:[],2:[],3:[],4:[],5:[]},
      };
      for (const q of POOL) {
        const t = q.t || 'v';
        const lv = q.l === 6 ? 5 : q.l;
        if (buckets[t] && buckets[t][lv]) buckets[t][lv].push(q);
      }
      const picked = [];
      for (const t of ['g', 'v']) {
        const mix = (t === 'g' ? band.grammar : band.vocab) || {};
        for (const lvStr of Object.keys(mix)) {
          const need = mix[lvStr];
          if (!need) continue;
          const candidates = buckets[t][+lvStr] || [];
          if (!candidates.length) continue;
          const idx = Array.from(candidates.keys());
          for (let i = idx.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [idx[i], idx[j]] = [idx[j], idx[i]];
          }
          for (let i = 0; i < Math.min(need, idx.length); i++) {
            picked.push(candidates[idx[i]]);
          }
        }
      }
      // Final shuffle so grammar/vocab don't appear in block order
      for (let i = picked.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [picked[i], picked[j]] = [picked[j], picked[i]];
      }
      return picked;
    }
    function botAnswers(questions, botElo) {
      return questions.map(q => {
        const lv = q.l === 6 ? 5 : q.l;
        const strength = LEVEL_STRENGTH[lv] || 1000;
        const prob = 1 / (1 + Math.pow(10, (strength - botElo) / 400));
        return Math.random() < prob;
      });
    }
    function computeEloChange(userElo, botElo, userScore, botScore) {
      const expected = 1 / (1 + Math.pow(10, (botElo - userElo) / 400));
      const result = userScore > botScore ? 1 : (userScore < botScore ? 0 : 0.5);
      const delta = Math.round(K_FACTOR * (result - expected));
      return { delta, result, expected };
    }

    function showMatchSearch() {
      const userElo = randomUserElo();
      const botElo = randomBotElo(userElo);
      const botName = BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)];
      root.innerHTML = `
        <div class="qg-card">
          <div class="qg-match-search">
            <div class="qg-match-loader"><i class="ti ti-loader-2"></i></div>
            <h2>Finding opponent…</h2>
            <p>Calibrating your rating</p>
          </div>
          <div class="qg-actions" style="margin-top:auto"><button class="qg-btn-secondary" id="qg-cancel">Cancel</button></div>
        </div>
      `;
      const cancelBtn = document.getElementById('qg-cancel');
      const t = setTimeout(() => showMatchIntro(userElo, botElo, botName), 1500);
      cancelBtn.addEventListener('click', () => { clearTimeout(t); showWelcome(); });
    }

    function showMatchIntro(userElo, botElo, botName) {
      const band = getEloBand(userElo);
      root.innerHTML = `
        <div class="qg-card">
          <div class="qg-match-intro">
            <div class="qg-screen-eyebrow">Bot match · ready</div>
            <h2>Match <em>found</em>.</h2>
            <div class="qg-match-pair">
              <div class="qg-match-card qg-match-you">
                <div class="qg-match-card-label">You</div>
                <div class="qg-match-card-name">You</div>
                <div class="qg-match-card-elo">${userElo}<small>ELO</small></div>
              </div>
              <div class="qg-match-vs">vs</div>
              <div class="qg-match-card qg-match-opp">
                <div class="qg-match-card-label">Opponent</div>
                <div class="qg-match-card-name">${escapeHtml(botName)}</div>
                <div class="qg-match-card-elo">${botElo}<small>ELO</small></div>
              </div>
            </div>
            <p class="qg-match-band">Band <b>${band.label}</b> · ${TOTAL} questions · ${SECONDS}s each</p>
            <div class="qg-actions">
              <button class="qg-btn qg-btn-accent" id="qg-match-start">Start match</button>
              <button class="qg-btn-secondary" id="qg-match-cancel">Back</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('qg-match-start').addEventListener('click', () => startMatch(userElo, botElo, botName));
      document.getElementById('qg-match-cancel').addEventListener('click', showWelcome);
    }

    function startMatch(userElo, botElo, botName) {
      const questions = pickQuestionsByElo(userElo);
      if (questions.length < TOTAL) {
        root.innerHTML = `<div class="qg-card"><div class="qg-error">Not enough questions for ELO band ${getEloBand(userElo).label}. Got ${questions.length}.</div></div>`;
        return;
      }
      const botResults = botAnswers(questions, botElo);
      match = {
        userElo, botElo, botName, questions, botResults,
        idx: 0, userScore: 0, botScore: 0,
        answers: [],
        mode: 'bot',
      };
      showMatchQuestion();
    }

    function showMatchQuestion() {
      const q = match.questions[match.idx];
      const num = match.idx + 1;
      const oppLabel = match.mode === 'friend' ? match.oppName : match.botName;
      root.innerHTML = `
        <div class="qg-card">
          <div class="qg-header qg-match-header">
            <span>Q ${num} / ${TOTAL}</span>
            <span class="qg-match-scoreline">
              <span class="qg-match-you-score">You ${match.userScore}</span>
              <span class="qg-match-sep">·</span>
              <span class="qg-match-opp-score">${escapeHtml(oppLabel)} ${match.mode === 'friend' && match.oppScore === null ? '–' : (match.mode === 'friend' ? match.oppScore : match.botScore)}</span>
            </span>
          </div>
          <div class="qg-bar-track"><div class="qg-bar-fill" id="qg-bar"></div></div>
          <p class="qg-question">${escapeHtml(q.q)}</p>
          <div class="qg-options" id="qg-options">
            ${q.o.map((opt, i) => `<button class="qg-opt" data-i="${i}" data-letter="${'ABCD'[i]}">${escapeHtml(opt)}</button>`).join('')}
          </div>
          <div class="qg-status" id="qg-status">&nbsp;</div>
        </div>
      `;
      const bar = document.getElementById('qg-bar');
      const opts = root.querySelectorAll('.qg-opt');
      opts.forEach(b => b.addEventListener('click', () => matchAnswer(parseInt(b.dataset.i, 10))));
      requestAnimationFrame(() => {
        bar.style.transition = `width ${SECONDS}s linear`;
        bar.style.width = '0%';
      });
      match.timer = setTimeout(() => matchAnswer(null), SECONDS * 1000);
      match.startTime = Date.now();
      match.locked = false;
    }

    function matchAnswer(picked) {
      if (match.locked) return;
      match.locked = true;
      clearTimeout(match.timer);
      const q = match.questions[match.idx];
      const correct = q.c;
      const timedOut = picked === null;
      const userCorrect = correct === picked;

      let botCorrect = null;
      if (match.mode === 'bot') {
        botCorrect = match.botResults[match.idx];
        if (botCorrect) match.botScore++;
      }
      if (userCorrect) match.userScore++;
      match.answers.push({ q, picked, userCorrect, botCorrect, timedOut });

      const bar = document.getElementById('qg-bar');
      if (bar) {
        const elapsed = (Date.now() - match.startTime) / 1000;
        const remaining = Math.max(0, 1 - elapsed / SECONDS);
        bar.style.transition = 'none';
        bar.style.width = (remaining * 100) + '%';
      }
      const opts = root.querySelectorAll('.qg-opt');
      opts.forEach((b, i) => {
        b.disabled = true;
        if (i === correct) b.classList.add('qg-correct');
        else if (i === picked) b.classList.add('qg-wrong');
        else b.classList.add('qg-fade');
      });
      const status = document.getElementById('qg-status');
      if (match.mode === 'bot') {
        const youIcon = userCorrect ? '✓' : (timedOut ? '⏰' : '✗');
        const botIcon = botCorrect ? '✓' : '✗';
        status.innerHTML = `<span class="qg-match-you-result">You ${youIcon}</span> <span class="qg-match-sep">·</span> <span class="qg-match-opp-result">${escapeHtml(match.botName)} ${botIcon}</span>`;
      } else {
        const youIcon = userCorrect ? '✓' : (timedOut ? '⏰' : '✗');
        status.innerHTML = `<span class="qg-match-you-result">You ${youIcon}</span>`;
      }

      const delay = timedOut ? 1300 : 1000;
      setTimeout(() => {
        match.idx++;
        if (match.idx < TOTAL) showMatchQuestion();
        else if (match.mode === 'bot') showMatchEnd();
        else finishFriendOwnHalf();
      }, delay);
    }

    function showMatchEnd() {
      const { userElo, botElo, botName, userScore, botScore } = match;
      const { delta, result } = computeEloChange(userElo, botElo, userScore, botScore);
      const outcome = result === 1 ? 'WIN' : (result === 0 ? 'LOSS' : 'DRAW');
      const outcomeClass = result === 1 ? 'qg-match-win' : (result === 0 ? 'qg-match-loss' : 'qg-match-draw');
      const deltaStr = (delta > 0 ? '+' : '') + delta;
      const newElo = userElo + delta;

      const rows = match.answers.map((a, i) => {
        const youIcon = a.userCorrect ? 'ti-check' : (a.timedOut ? 'ti-clock' : 'ti-x');
        const youCls = a.userCorrect ? 'qg-ok' : (a.timedOut ? 'qg-skip' : 'qg-bad');
        const botIcon = a.botCorrect ? 'ti-check' : 'ti-x';
        const botCls = a.botCorrect ? 'qg-ok' : 'qg-bad';
        return `
          <div class="qg-row">
            <span class="qg-row-num">${i + 1}</span>
            <span class="qg-row-icon ${youCls}"><i class="ti ${youIcon}" aria-hidden="true"></i></span>
            <span class="qg-row-icon ${botCls}"><i class="ti ${botIcon}" aria-hidden="true"></i></span>
            <span class="qg-level-pill">L${a.q.l}</span>
            <span class="qg-row-q">${escapeHtml(a.q.q)}</span>
          </div>`;
      }).join('');

      root.innerHTML = `
        <div class="qg-card">
          <div class="qg-match-result ${outcomeClass}">
            <div class="qg-match-outcome">${outcome}</div>
            <div class="qg-match-scores">
              <div class="qg-match-score-side">
                <div class="qg-match-score-label">You</div>
                <div class="qg-match-score-val">${userScore}</div>
              </div>
              <div class="qg-match-score-sep">—</div>
              <div class="qg-match-score-side">
                <div class="qg-match-score-label">${escapeHtml(botName)}</div>
                <div class="qg-match-score-val">${botScore}</div>
              </div>
            </div>
            <div class="qg-match-elo-row">
              <span class="qg-match-elo-from">${userElo}</span>
              <span class="qg-match-elo-delta">${deltaStr}</span>
              <span class="qg-match-elo-to">→ ${newElo}</span>
            </div>
          </div>
          <div class="qg-summary-head"><span></span><span>You</span><span>${escapeHtml(botName).slice(0,3)}</span><span>Lv</span><span>Question</span></div>
          <div class="qg-summary">${rows}</div>
          <div class="qg-actions">
            <button class="qg-btn qg-btn-accent" id="qg-match-rematch">Rematch</button>
            <button class="qg-btn-secondary" id="qg-match-back">Back to menu</button>
          </div>
        </div>
      `;
      document.getElementById('qg-match-rematch').addEventListener('click', showMatchSearch);
      document.getElementById('qg-match-back').addEventListener('click', showWelcome);
    }

    const CODE_ALPHABET = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no O,0,I,1

      let s = '';
      for (let i = 0; i < 4; i++) s += CODE_ALPHABET[Math.floor(Math.random() * CODE_ALPHABET.length)];
      return s;
    }
    function clampElo(n) {
      n = parseInt(n, 10);
      if (Number.isNaN(n)) return 1100;
      return Math.max(700, Math.min(2000, n));

    async function createLobby() {
      const nameEl = document.getElementById('qg-name');
      const eloEl = document.getElementById('qg-elo');
      const errEl = document.getElementById('qg-create-err');
      const name = (nameEl.value || '').trim();
      const elo = clampElo(eloEl.value);
      if (!name) { errEl.textContent = 'Add your name first.'; errEl.style.color = 'var(--text-danger)'; nameEl.focus(); return; }
      saveStored(name, elo);

      const goBtn = document.getElementById('qg-create-go');
      goBtn.disabled = true;
      errEl.style.color = 'var(--text-secondary)';
      errEl.textContent = 'Spinning up lobby…';

      // pick questions deterministically once, store their IDs
      const questions = pickQuestionsByElo(elo);
      if (questions.length < TOTAL) {
        errEl.textContent = `Not enough questions for ELO band ${getEloBand(elo).label}.`;
        errEl.style.color = 'var(--text-danger)';
        goBtn.disabled = false;
        return;
      }
      const questionIds = questions.map(q => q.i);

      // Try a few codes in case of collision
      let inserted = null;
      let db;
      try { db = await getSupabase(); }
      catch (e) {
        errEl.textContent = 'Could not reach the matchmaking service. Check your connection.';
        errEl.style.color = 'var(--text-danger)';
        goBtn.disabled = false;
        return;
      }
      if (!db) {
        errEl.textContent = 'Matchmaking backend not configured.';
        errEl.style.color = 'var(--text-danger)';
        goBtn.disabled = false;
        return;
      }
      for (let attempt = 0; attempt < 6; attempt++) {
        const code = genLobbyCode();
        const { data, error } = await db
          .from(LOBBY_TABLE)
          .insert({
            code,
            player1_name: name,
            player1_elo: elo,
            question_ids: questionIds,
            status: 'waiting',
          })
          .select()
          .single();
        if (!error) { inserted = data; break; }
        if (error.code === '23505' || /duplicate/i.test(error.message)) continue; // collision, retry
        errEl.textContent = 'Could not create lobby: ' + (error.message || 'unknown error');
        errEl.style.color = 'var(--text-danger)';
        goBtn.disabled = false;
        return;
      }
      if (!inserted) {
        errEl.textContent = 'Could not generate a unique lobby code. Try again.';
        errEl.style.color = 'var(--text-danger)';
        goBtn.disabled = false;
        return;
      }

      friend = {
        role: 'host',
        lobbyId: inserted.id,
        code: inserted.code,
        questions,            // resolved local question objects in order
        questionIds,
        selfName: name,
        selfElo: elo,
        oppName: null,
        oppElo: null,
        pollTimer: null,
      };
      showLobbyWaiting();
    }

            .update({ status: 'cancelled', updated_at: new Date().toISOString() })
            .eq('id', friend.lobbyId);
        } catch (e) { /* best-effort */ }
      }
      friend = null;
      showWelcome();
    }

    function pollHostLobby() {
      stopFriendPolling();
      friend.pollTimer = setInterval(async () => {
        if (!friend) return;
        const db = await getSupabase().catch(() => null);
        if (!db) return;
        const { data, error } = await db
          .from(LOBBY_TABLE)
          .select('*')
          .eq('id', friend.lobbyId)
          .single();
        if (error || !data) return;
        if (data.status === 'cancelled') {
          stopFriendPolling();
          friend = null;
          showWelcome();
          return;
        }
        if (data.status === 'ready' && data.player2_name) {
          stopFriendPolling();
          friend.oppName = data.player2_name;
          friend.oppElo = data.player2_elo;
          showFriendIntro();
        }
      }, 1500);
    }

    async function joinLobby() {
      const nameEl = document.getElementById('qg-name');
      const eloEl = document.getElementById('qg-elo');
      const codeEl = document.getElementById('qg-code');
      const errEl = document.getElementById('qg-join-err');
      const name = (nameEl.value || '').trim();
      const elo = clampElo(eloEl.value);
      const code = (codeEl.value || '').trim().toUpperCase();
      if (!name) { errEl.textContent = 'Add your name first.'; errEl.style.color = 'var(--text-danger)'; nameEl.focus(); return; }
      if (code.length !== 4) { errEl.textContent = 'Lobby code is 4 characters.'; errEl.style.color = 'var(--text-danger)'; codeEl.focus(); return; }
      saveStored(name, elo);

      const goBtn = document.getElementById('qg-join-go');
      goBtn.disabled = true;
      errEl.style.color = 'var(--text-secondary)';
      errEl.textContent = 'Looking up lobby…';

      let db;
      try { db = await getSupabase(); }
      catch (e) {
        errEl.textContent = 'Could not reach the matchmaking service.';
        errEl.style.color = 'var(--text-danger)';
        goBtn.disabled = false;
        return;
      }
      if (!db) {
        errEl.textContent = 'Matchmaking backend not configured.';
        errEl.style.color = 'var(--text-danger)';
        goBtn.disabled = false;
        return;
      }
      const { data: lobby, error: fetchErr } = await db
        .from(LOBBY_TABLE)
        .select('*')
        .eq('code', code)
        .maybeSingle();
      if (fetchErr || !lobby) {
        errEl.textContent = 'No lobby with that code. Double-check with your friend.';
        errEl.style.color = 'var(--text-danger)';
        goBtn.disabled = false;
        return;
      }
      if (lobby.status !== 'waiting') {
        errEl.textContent = `Lobby is ${lobby.status}. Ask your friend to create a new one.`;
        errEl.style.color = 'var(--text-danger)';
        goBtn.disabled = false;
        return;
      }
      const { data: updated, error: updErr } = await db
        .from(LOBBY_TABLE)
        .update({
          player2_name: name,
          player2_elo: elo,
          status: 'ready',
          updated_at: new Date().toISOString(),
        })
        .eq('id', lobby.id)
        .eq('status', 'waiting') // optimistic lock
        .select()
        .single();
      if (updErr || !updated) {
        errEl.textContent = 'Could not join (someone may have just joined). Try again.';
        errEl.style.color = 'var(--text-danger)';
        goBtn.disabled = false;
        return;
      }

      // resolve question objects in the same order
      const questionIds = Array.isArray(updated.question_ids) ? updated.question_ids : [];
      const byId = new Map(POOL.map(q => [q.i, q]));
      const questions = questionIds.map(id => byId.get(id)).filter(Boolean);
      if (questions.length < TOTAL) {
        errEl.textContent = 'Lobby question set is incomplete.';
        errEl.style.color = 'var(--text-danger)';
        goBtn.disabled = false;
        return;
      }

      friend = {
        role: 'guest',
        lobbyId: updated.id,
        code: updated.code,
        questions,
        questionIds,
        selfName: name,
        selfElo: elo,
        oppName: updated.player1_name,
        oppElo: updated.player1_elo,
        pollTimer: null,
      };
      showFriendIntro();
    }

    function showFriendIntro() {
      stopFriendPolling();
      const hostName = friend.role === 'host' ? friend.selfName : friend.oppName;
      const hostElo  = friend.role === 'host' ? friend.selfElo  : friend.oppElo;
      const guestName = friend.role === 'host' ? friend.oppName : friend.selfName;
      const guestElo  = friend.role === 'host' ? friend.oppElo  : friend.selfElo;
      const ctaLabel = friend.role === 'host' ? 'Start match' : 'Waiting for host…';
      root.innerHTML = `
        <div class="qg-card">
          <div class="qg-match-intro">
            <div class="qg-screen-eyebrow">Lobby ${escapeHtml(friend.code)} · ready</div>
            <h2>Match <em>found</em>.</h2>
            <div class="qg-match-pair">
              <div class="qg-match-card">
                <div class="qg-match-card-label">${friend.role === 'host' ? 'You · Host' : 'Host'}</div>
                <div class="qg-match-card-name">${escapeHtml(hostName)}</div>
                <div class="qg-match-card-elo">${hostElo}<small>ELO</small></div>
              </div>
              <div class="qg-match-vs">vs</div>
              <div class="qg-match-card">
                <div class="qg-match-card-label">${friend.role === 'guest' ? 'You · Guest' : 'Guest'}</div>
                <div class="qg-match-card-name">${escapeHtml(guestName)}</div>
                <div class="qg-match-card-elo">${guestElo}<small>ELO</small></div>
              </div>
            </div>
            <p class="qg-match-band">${TOTAL} questions · ${SECONDS}s each · same questions, played independently</p>
            <div class="qg-actions">
              ${friend.role === 'host'
                ? `<button class="qg-btn qg-btn-accent" id="qg-friend-start">${ctaLabel}</button>`
                : `<div class="qg-lobby-status"><span class="qg-pulse-dot"></span> ${ctaLabel}</div>`}
              <button class="qg-btn-secondary" id="qg-friend-cancel">Leave</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('qg-friend-cancel').addEventListener('click', leaveFriendMatch);
      if (friend.role === 'host') {
        document.getElementById('qg-friend-start').addEventListener('click', hostKickoff);
      } else {
        // guest polls for in_progress
        friend.pollTimer = setInterval(async () => {
          if (!friend) return;
          const { data } = await (await getSupabase()).from(LOBBY_TABLE).select('status').eq('id', friend.lobbyId).single();
          if (!data) return;
          if (data.status === 'cancelled') { stopFriendPolling(); friend = null; showWelcome(); return; }
          if (data.status === 'in_progress' || data.status === 'done') {
            stopFriendPolling();
            startFriendMatch();
          }
        }, 1500);
      }
    }

    async function hostKickoff() {
      // Flip status to in_progress; show a 3-2-1 countdown then begin
      try {
        await (await getSupabase()).from(LOBBY_TABLE)
          .update({ status: 'in_progress', updated_at: new Date().toISOString() })
          .eq('id', friend.lobbyId);
      } catch(e) {}
      runCountdownThen(startFriendMatch);
    }

    function runCountdownThen(next) {
      let n = 3;
      root.innerHTML = `
        <div class="qg-card">
          <div style="text-align:center;padding:1rem 0 2rem">
            <div class="qg-screen-eyebrow">Match starts in</div>
            <div class="qg-countdown" id="qg-cd">${n}</div>
            <p style="font-family:var(--font-mono);font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-tertiary)">Get ready</p>
          </div>
        </div>`;
      const el = document.getElementById('qg-cd');
      const t = setInterval(() => {
        n--;
        if (n <= 0) { clearInterval(t); next(); }
        else el.textContent = n;
      }, 800);
    }

    function startFriendMatch() {
      // Reuse the same question UI as bot, but in 'friend' mode
      match = {
        userElo: friend.selfElo,
        botElo: friend.oppElo,
        botName: friend.oppName,     // unused in friend mode but kept for safety
        oppName: friend.oppName,
        oppScore: null,              // we don't know live; updated by polling at end
        questions: friend.questions,
        botResults: null,
        idx: 0, userScore: 0, botScore: 0,
        answers: [],
        mode: 'friend',
      };
      showMatchQuestion();
    }

    async function finishFriendOwnHalf() {
      // Submit our score + per-question results, then wait for opponent.
      const results = match.answers.map(a => !!a.userCorrect);
      const field = friend.role === 'host' ? 'player1' : 'player2';
      const payload = {
        [`${field}_score`]: match.userScore,
        [`${field}_results`]: results,
        updated_at: new Date().toISOString(),
      };
      try {
        await (await getSupabase()).from(LOBBY_TABLE).update(payload).eq('id', friend.lobbyId);
      } catch (e) {}
      showFriendWaitingForOpp();
    }

    function showFriendWaitingForOpp() {
      root.innerHTML = `
        <div class="qg-card">
          <div class="qg-screen-head">
            <div>
              <div class="qg-screen-eyebrow">Half time</div>
              <h2 class="qg-screen-title">You scored <em style="font-style:italic;color:var(--bg-accent)">${match.userScore}/${TOTAL}</em></h2>
            </div>
            <button class="qg-btn-ghost" id="qg-leave"><i class="ti ti-x"></i> Leave</button>
          </div>
          <div style="text-align:center;padding:1.5rem 0">
            <div class="qg-match-loader"><i class="ti ti-loader-2"></i></div>
            <p style="font-family:var(--font-mono);font-size:12.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-secondary);margin-top:1rem">
              Waiting for ${escapeHtml(friend.oppName)} to finish…
            </p>
          </div>
        </div>
      `;
      document.getElementById('qg-leave').addEventListener('click', leaveFriendMatch);
      pollForFriendCompletion();
    }

    function pollForFriendCompletion() {
      stopFriendPolling();
      friend.pollTimer = setInterval(async () => {
        if (!friend) return;
        const db = await getSupabase().catch(() => null);
        if (!db) return;
        const { data, error } = await db
          .from(LOBBY_TABLE)
          .select('*')
          .eq('id', friend.lobbyId)
          .single();
        if (error || !data) return;
        const p1Done = data.player1_results && Array.isArray(data.player1_results) && data.player1_results.length === TOTAL;
        const p2Done = data.player2_results && Array.isArray(data.player2_results) && data.player2_results.length === TOTAL;
        if (p1Done && p2Done) {
          stopFriendPolling();
          // Mark done (best effort, idempotent)
          if (data.status !== 'done') {
            try { await (await getSupabase()).from(LOBBY_TABLE).update({ status: 'done', updated_at: new Date().toISOString() }).eq('id', friend.lobbyId); } catch(e) {}
          }
          showFriendEnd(data);
        }
      }, 1500);
    }

    function showFriendEnd(lobby) {
      const isHost = friend.role === 'host';
      const youScore = isHost ? lobby.player1_score : lobby.player2_score;
      const oppScore = isHost ? lobby.player2_score : lobby.player1_score;
      const youRes   = isHost ? lobby.player1_results : lobby.player2_results;
      const oppRes   = isHost ? lobby.player2_results : lobby.player1_results;
      const oppName  = friend.oppName;
      const youElo   = friend.selfElo;
      const oppElo   = friend.oppElo;

      let outcome = 'DRAW', outcomeClass = 'qg-match-draw';
      if (youScore > oppScore) { outcome = 'WIN';  outcomeClass = 'qg-match-win'; }
      else if (youScore < oppScore) { outcome = 'LOSS'; outcomeClass = 'qg-match-loss'; }

      const rows = friend.questions.map((q, i) => {
        const yC = !!(youRes && youRes[i]);
        const oC = !!(oppRes && oppRes[i]);
        const youIcon = yC ? 'ti-check' : 'ti-x';
        const youCls = yC ? 'qg-ok' : 'qg-bad';
        const oppIcon = oC ? 'ti-check' : 'ti-x';
        const oppCls = oC ? 'qg-ok' : 'qg-bad';
        return `
          <div class="qg-row">
            <span class="qg-row-num">${i + 1}</span>
            <span class="qg-row-icon ${youCls}"><i class="ti ${youIcon}" aria-hidden="true"></i></span>
            <span class="qg-row-icon ${oppCls}"><i class="ti ${oppIcon}" aria-hidden="true"></i></span>
            <span class="qg-level-pill">L${q.l}</span>
            <span class="qg-row-q">${escapeHtml(q.q)}</span>
          </div>`;
      }).join('');

      root.innerHTML = `
        <div class="qg-card">
          <div class="qg-match-result ${outcomeClass}">
            <div class="qg-match-outcome">${outcome}</div>
            <div class="qg-match-scores">
              <div class="qg-match-score-side">
                <div class="qg-match-score-label">You</div>
                <div class="qg-match-score-val">${youScore}</div>
              </div>
              <div class="qg-match-score-sep">—</div>
              <div class="qg-match-score-side">
                <div class="qg-match-score-label">${escapeHtml(oppName)}</div>
                <div class="qg-match-score-val">${oppScore}</div>
              </div>
            </div>
            <div class="qg-match-elo-row">
              <span class="qg-match-elo-from">${youElo}</span>
              <span class="qg-match-elo-delta">vs</span>
              <span class="qg-match-elo-to">${oppElo}</span>
            </div>
          </div>
          <div class="qg-summary-head"><span></span><span>You</span><span>${escapeHtml(oppName).slice(0,3)}</span><span>Lv</span><span>Question</span></div>
          <div class="qg-summary">${rows}</div>
          <div class="qg-actions">
            <button class="qg-btn qg-btn-accent" id="qg-friend-again">Play again</button>
            <button class="qg-btn-secondary" id="qg-friend-menu">Back to menu</button>
          </div>
        </div>
      `;
      document.getElementById('qg-friend-again').addEventListener('click', () => {
        friend = null; showFriendChoice();
      });
      document.getElementById('qg-friend-menu').addEventListener('click', () => {
        friend = null; showWelcome();
      });
    }

    async function leaveFriendMatch() {
      stopFriendPolling();
      if (friend && friend.lobbyId) {
        try {
          await (await getSupabase()).from(LOBBY_TABLE)
            .update({ status: 'cancelled', updated_at: new Date().toISOString() })
            .eq('id', friend.lobbyId);
        } catch(e) {}
      }
      friend = null;
      showWelcome();
    }

    // ----------------------------------------------------------------
    // Util
    // ----------------------------------------------------------------
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function showToast(msg) {
      const t = document.getElementById('qg-toast');
      t.textContent = msg;
      t.classList.add('qg-toast-show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => t.classList.remove('qg-toast-show'), 1400);
    }
  </script>
</body>
</html>
