<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
  <title>Vocabulary Quiz</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.21.0/dist/tabler-icons.min.css" />
  <style>
    :root {
      --bg-page: #fafaf7;
      --bg-primary: #ffffff;
      --bg-secondary: #f1efe8;
      --bg-success: #eaf3de;
      --bg-danger: #fcebeb;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b65;
      --text-tertiary: #9a9a93;
      --text-success: #27500a;
      --text-danger: #791f1f;
      --border-tertiary: rgba(0,0,0,0.12);
      --border-secondary: rgba(0,0,0,0.24);
      --border-success: rgba(99,153,34,0.5);
      --border-danger: rgba(226,75,74,0.5);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page: #1a1a1a;
        --bg-primary: #242424;
        --bg-secondary: #2e2e2e;
        --bg-success: #1a3a0a;
        --bg-danger: #3a1414;
        --text-primary: #f0f0ed;
        --text-secondary: #b0b0a8;
        --text-tertiary: #707068;
        --text-success: #97c459;
        --text-danger: #f09595;
        --border-tertiary: rgba(255,255,255,0.12);
        --border-secondary: rgba(255,255,255,0.24);
        --border-success: rgba(99,153,34,0.4);
        --border-danger: rgba(226,75,74,0.4);
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: var(--font-sans);
      line-height: 1.5;
      min-height: 100vh;
    }
    body { display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .qg-app { width: 100%; max-width: 600px; }
    .qg-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-tertiary);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      min-height: 360px;
      display: flex;
      flex-direction: column;
    }
    .qg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .qg-level-pill {
      display: inline-block;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      padding: 3px 10px;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 500;
    }
    .qg-bar-track {
      height: 4px;
      background: var(--bg-secondary);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .qg-bar-fill {
      height: 100%;
      background: var(--text-primary);
      width: 100%;
      transition: width linear;
    }
    .qg-question {
      font-size: 18px;
      font-weight: 500;
      line-height: 1.5;
      margin: 0 0 1.25rem;
      color: var(--text-primary);
    }
    .qg-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
    }
    .qg-opt {
      text-align: left;
      padding: 12px 14px;
      font-size: 15px;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-tertiary);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: background-color 0.15s, border-color 0.15s;
    }
    .qg-opt:hover:not(:disabled) {
      background: var(--bg-secondary);
      border-color: var(--border-secondary);
    }
    .qg-opt:disabled { cursor: default; }
    .qg-opt.qg-correct {
      background: var(--bg-success);
      border-color: var(--border-success);
      color: var(--text-success);
    }
    .qg-opt.qg-wrong {
      background: var(--bg-danger);
      border-color: var(--border-danger);
      color: var(--text-danger);
    }
    .qg-opt.qg-fade { opacity: 0.5; }
    .qg-btn {
      padding: 11px 22px;
      font-size: 14px;
      font-weight: 500;
      background: var(--text-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-family: var(--font-sans);
    }
    .qg-btn:hover { opacity: 0.85; }
    .qg-welcome { text-align: center; padding: 2rem 0; margin: auto 0; }
    .qg-welcome h1 { margin: 0 0 0.5rem; font-size: 28px; font-weight: 500; }
    .qg-welcome p { color: var(--text-secondary); margin: 0 0 1.75rem; font-size: 15px; }
    .qg-end-score { font-size: 48px; font-weight: 500; text-align: center; margin: 0.5rem 0 0.25rem; }
    .qg-end-sub { text-align: center; color: var(--text-secondary); font-size: 14px; margin: 0 0 1.5rem; }
    .qg-summary { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.25rem; }
    .qg-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      font-size: 13px;
    }
    .qg-row-num { font-weight: 500; color: var(--text-secondary); min-width: 24px; }
    .qg-row-icon { font-size: 16px; width: 18px; display: inline-flex; justify-content: center; }
    .qg-row-icon.qg-ok { color: var(--text-success); }
    .qg-row-icon.qg-bad { color: var(--text-danger); }
    .qg-row-icon.qg-skip { color: var(--text-tertiary); }
    .qg-row-q {
      flex: 1;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .qg-actions { display: flex; justify-content: center; gap: 10px; }
    .qg-status {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }
    .qg-loading {
      text-align: center;
      padding: 3rem 0;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .qg-error {
      text-align: center;
      padding: 2rem 0;
      color: var(--text-danger);
      font-size: 14px;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <h1 class="sr-only">Vocabulary quiz: 10 questions, 7 seconds each, with a level summary at the end</h1>
  <main class="qg-app">
    <div class="qg-card" id="qg-root">
      <div class="qg-loading">Loading questions…</div>
    </div>
  </main>
  <script>
    (function () {
      const TOTAL = 10;
      const SECONDS = 7;
      let POOL = null;
      let game = null;
      const root = document.getElementById('qg-root');

      fetch('questions.json')
        .then(r => {
          if (!r.ok) throw new Error('Failed to load questions: ' + r.status);
          return r.json();
        })
        .then(data => {
          POOL = data;
          showWelcome();
        })
        .catch(err => {
          root.innerHTML = '<div class="qg-error">Could not load questions. ' + escapeHtml(err.message) + '</div>';
        });

      function showWelcome() {
        root.innerHTML = `
          <div class="qg-welcome">
            <h1>Vocabulary quiz</h1>
            <p>10 questions. 7 seconds each. Pick the word that fits.</p>
            <button class="qg-btn" id="qg-start">Start</button>
          </div>
        `;
        document.getElementById('qg-start').addEventListener('click', start);
      }

      function pickQuestions() {
        const idxs = new Set();
        while (idxs.size < TOTAL) { idxs.add(Math.floor(Math.random() * POOL.length)); }
        return [...idxs].map(i => POOL[i]);
      }

      function start() {
        game = { qs: pickQuestions(), idx: 0, answers: [] };
        showQuestion();
      }

      function showQuestion() {
        const q = game.qs[game.idx];
        const num = game.idx + 1;
        root.innerHTML = `
          <div class="qg-header">
            <span>Question ${num} of ${TOTAL}</span>
            <span class="qg-level-pill">Level ${q.l}</span>
          </div>
          <div class="qg-bar-track"><div class="qg-bar-fill" id="qg-bar"></div></div>
          <p class="qg-question">${escapeHtml(q.q)}</p>
          <div class="qg-options" id="qg-options">
            ${q.o.map((opt, i) => `<button class="qg-opt" data-i="${i}">${escapeHtml(opt)}</button>`).join('')}
          </div>
          <div class="qg-status" id="qg-status">&nbsp;</div>
        `;
        const bar = document.getElementById('qg-bar');
        const opts = root.querySelectorAll('.qg-opt');
        opts.forEach(b => b.addEventListener('click', () => answer(parseInt(b.dataset.i, 10))));

        requestAnimationFrame(() => {
          bar.style.transition = `width ${SECONDS}s linear`;
          bar.style.width = '0%';
        });

        game.timer = setTimeout(() => answer(null), SECONDS * 1000);
        game.startTime = Date.now();
        game.locked = false;
      }

      function answer(picked) {
        if (game.locked) return;
        game.locked = true;
        clearTimeout(game.timer);
        const q = game.qs[game.idx];
        const correct = q.c;
        const timedOut = picked === null;
        game.answers.push({ q: q, picked: picked, correct: correct === picked, timedOut: timedOut });

        const bar = document.getElementById('qg-bar');
        if (bar) {
          const elapsed = (Date.now() - game.startTime) / 1000;
          const remaining = Math.max(0, 1 - elapsed / SECONDS);
          bar.style.transition = 'none';
          bar.style.width = (remaining * 100) + '%';
        }

        const opts = root.querySelectorAll('.qg-opt');
        opts.forEach((b, i) => {
          b.disabled = true;
          if (i === correct) b.classList.add('qg-correct');
          else if (i === picked) b.classList.add('qg-wrong');
          else b.classList.add('qg-fade');
        });

        const status = document.getElementById('qg-status');
        if (timedOut) status.textContent = "Time's up";
        else if (picked === correct) status.textContent = 'Correct';
        else status.textContent = 'Incorrect';

        const delay = timedOut ? 1200 : 900;
        setTimeout(() => {
          game.idx++;
          if (game.idx < TOTAL) showQuestion();
          else showEnd();
        }, delay);
      }

      function showEnd() {
        const score = game.answers.filter(a => a.correct).length;
        const levelTally = {};
        game.answers.forEach(a => { levelTally[a.q.l] = (levelTally[a.q.l] || 0) + 1; });
        const levelSummary = Object.keys(levelTally).sort().map(k => `L${k}×${levelTally[k]}`).join(' · ');
        const rows = game.answers.map((a, i) => {
          const iconClass = a.correct ? 'qg-ok' : (a.timedOut ? 'qg-skip' : 'qg-bad');
          const iconName = a.correct ? 'ti-check' : (a.timedOut ? 'ti-clock' : 'ti-x');
          return `
            <div class="qg-row">
              <span class="qg-row-num">${i + 1}</span>
              <span class="qg-row-icon ${iconClass}"><i class="ti ${iconName}" aria-hidden="true"></i></span>
              <span class="qg-level-pill">L${a.q.l}</span>
              <span class="qg-row-q">${escapeHtml(a.q.q)}</span>
            </div>`;
        }).join('');
        root.innerHTML = `
          <div class="qg-end-score">${score} / ${TOTAL}</div>
          <p class="qg-end-sub">Levels in this round: ${levelSummary}</p>
          <div class="qg-summary">${rows}</div>
          <div class="qg-actions">
            <button class="qg-btn" id="qg-again">Play again</button>
          </div>
        `;
        document.getElementById('qg-again').addEventListener('click', start);
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      }
    })();
  </script>
</body>
</html>
